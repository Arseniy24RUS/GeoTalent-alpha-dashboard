name: Comment payload probe

on:
  issue_comment:
    types: [created]

permissions:
  contents: read

jobs:
  probe:
    if: github.event.issue.number == 1 && startsWith(github.event.comment.body, 'GEOTALENT_PAYLOAD_PROBE_')
    runs-on: ubuntu-latest
    steps:
      - name: Measure comment payload
        shell: bash
        run: |
          python - <<'PY'
          import hashlib, json, os
          event = json.load(open(os.environ['GITHUB_EVENT_PATH'], encoding='utf-8'))
          body = event['comment']['body']
          payload = body.split('\n', 1)[1] if '\n' in body else ''
          print('BODY_CHARS=' + str(len(body)))
          print('PAYLOAD_CHARS=' + str(len(payload)))
          print('PAYLOAD_UTF8=' + str(len(payload.encode('utf-8'))))
          print('PAYLOAD_SHA1=' + hashlib.sha1(payload.encode('utf-8')).hexdigest())
          print('PAYLOAD_SUFFIX=' + payload[-32:])
          PY
