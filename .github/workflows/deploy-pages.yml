name: Deploy GeoTalent Pages

on:
  push:
    branches: [main]
    paths:
      - 'docs/**'
      - '.github/workflows/deploy-pages.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Validate production artifact
        shell: bash
        run: |
          set -euo pipefail
          test -s docs/index.html
          grep -q 'GEOTALENT_DEPLOYMENT_MARKER_20260712' docs/index.html
          grep -qi '<title>GeoTalent' docs/index.html
          test -f docs/.nojekyll
          echo "Validated $(wc -c < docs/index.html) bytes"

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
