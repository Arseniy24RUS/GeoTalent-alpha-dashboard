name: Publish GeoTalent dashboard

on:
  push:
    branches: [main]
    paths:
      - 'docs/**'
      - '.github/workflows/pages.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate static site
        shell: bash
        run: |
          set -euo pipefail
          test -s docs/index.html
          grep -qi '<html' docs/index.html
          grep -qi '<title' docs/index.html
          touch docs/.nojekyll
          echo "Static site is ready: $(wc -c < docs/index.html) bytes"

      - name: Configure Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./docs

      - name: Deploy Pages
        id: deployment
        uses: actions/deploy-pages@v4
