name: Verify GeoTalent public endpoint

on:
  issue_comment:
    types: [created]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  verify:
    if: github.event_name == 'workflow_dispatch' || contains(github.event.comment.body, 'VERIFY_GEOTALENT_PAGES_20260712')
    runs-on: ubuntu-latest
    timeout-minutes: 12
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Verify published HTML
        id: probe
        shell: bash
        run: |
          set -u
          url='https://arseniy24rus.github.io/GeoTalent-alpha-dashboard/'
          success=false
          code=000
          : > /tmp/geotalent.html
          for attempt in $(seq 1 60); do
            code=$(curl -L -sS -o /tmp/geotalent.html -w '%{http_code}' \
              --connect-timeout 15 --max-time 40 \
              -H 'Cache-Control: no-cache' "${url}?verification=${GITHUB_RUN_ID}-${attempt}" || true)
            bytes=$(wc -c < /tmp/geotalent.html 2>/dev/null || echo 0)
            echo "Attempt ${attempt}: HTTP ${code}; ${bytes} bytes"
            if [[ "${code}" == '200' ]] \
              && grep -q 'GEOTALENT_DEPLOYMENT_MARKER_20260712' /tmp/geotalent.html \
              && grep -qi '<title>GeoTalent' /tmp/geotalent.html; then
              success=true
              break
            fi
            sleep 10
          done
          echo "success=${success}" >> "$GITHUB_OUTPUT"
          echo "code=${code}" >> "$GITHUB_OUTPUT"

      - name: Persist verification evidence
        if: always()
        env:
          SUCCESS: ${{ steps.probe.outputs.success }}
          HTTP_CODE: ${{ steps.probe.outputs.code }}
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p verification
          bytes=$(wc -c < /tmp/geotalent.html 2>/dev/null || echo 0)
          hash=$(sha256sum /tmp/geotalent.html 2>/dev/null | awk '{print $1}' || true)
          python - <<'PY'
          import json, os
          from datetime import datetime, timezone
          payload = {
              'success': os.environ.get('SUCCESS') == 'true',
              'http_code': os.environ.get('HTTP_CODE', '000'),
              'url': 'https://arseniy24rus.github.io/GeoTalent-alpha-dashboard/',
              'checked_at_utc': datetime.now(timezone.utc).isoformat(),
              'workflow_run_id': os.environ.get('GITHUB_RUN_ID'),
              'commit_sha': os.environ.get('GITHUB_SHA'),
              'marker': 'GEOTALENT_DEPLOYMENT_MARKER_20260712',
          }
          open('verification/latest.json', 'w', encoding='utf-8').write(json.dumps(payload, ensure_ascii=False, indent=2) + '\n')
          PY
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add verification/latest.json
          git commit -m "ci: record Pages verification (${HTTP_CODE})" || true
          git push origin HEAD:main

      - name: Require successful public response
        if: always()
        shell: bash
        env:
          SUCCESS: ${{ steps.probe.outputs.success }}
        run: test "$SUCCESS" = 'true'
