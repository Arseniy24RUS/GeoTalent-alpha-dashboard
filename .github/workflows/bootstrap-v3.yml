name: Bootstrap GeoTalent repository v3

on:
  push:
    branches: [main]
    paths:
      - .github/workflows/bootstrap-v3.yml
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: geotalent-bootstrap-v3
  cancel-in-progress: false

jobs:
  bootstrap:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 25
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download complete GeoTalent package
        shell: bash
        run: |
          set -euo pipefail
          rm -rf /tmp/geotalent-extracted /tmp/geotalent.zip
          mkdir -p /tmp/geotalent-extracted
          urls=(
            "https://geotalent-alpha-dashboard.loca.lt/geotalent-dashboard-github-pages.zip"
            "https://geotalent-alpha-dashboard.serveo.net/geotalent-dashboard-github-pages.zip"
            "http://bore.pub:52438/geotalent-dashboard-github-pages.zip"
          )
          ok=0
          for url in "${urls[@]}"; do
            echo "Trying ${url}"
            rm -f /tmp/geotalent.zip
            if curl --fail --location --show-error \
              --header "bypass-tunnel-reminder: true" \
              --connect-timeout 25 --max-time 300 \
              --retry 5 --retry-delay 3 --retry-all-errors \
              "$url" --output /tmp/geotalent.zip; then
              if unzip -t /tmp/geotalent.zip >/dev/null 2>&1; then
                ok=1
                break
              fi
            fi
          done
          if [[ "$ok" != "1" ]]; then
            echo "No tunnel returned a valid ZIP package" >&2
            exit 1
          fi
          unzip -q /tmp/geotalent.zip -d /tmp/geotalent-extracted
          test -f /tmp/geotalent-extracted/package.json
          test -f /tmp/geotalent-extracted/docs/index.html
          test -f /tmp/geotalent-extracted/docs/downloads/DATA_INVENTORY.json

      - name: Synchronize all repository files
        shell: bash
        run: |
          set -euo pipefail
          find . -mindepth 1 -maxdepth 1 ! -name .git ! -name .github -exec rm -rf {} +
          mkdir -p .github/workflows
          find .github -mindepth 1 -maxdepth 1 ! -name workflows -exec rm -rf {} +
          rsync -a /tmp/geotalent-extracted/ ./ \
            --exclude '.git/' \
            --exclude '.github/workflows/'
          touch docs/.nojekyll
          python - <<'PY'
          from pathlib import Path
          expected = [
              'package.json', 'package-lock.json', 'README.md',
              'src/App.jsx', 'src/styles.css', 'docs/index.html',
              'docs/downloads/DATA_INVENTORY.json'
          ]
          missing = [p for p in expected if not Path(p).is_file()]
          if missing:
              raise SystemExit(f'Missing required files: {missing}')
          print('Files prepared:', sum(1 for p in Path('.').rglob('*') if p.is_file()))
          PY

      - name: Commit complete project
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "feat: publish complete GeoTalent dashboard" || true
          git push origin HEAD:main

      - name: Enable Pages
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          api="https://api.github.com/repos/${GITHUB_REPOSITORY}/pages"
          auth=(-H "Accept: application/vnd.github+json" -H "Authorization: Bearer ${GH_TOKEN}" -H "X-GitHub-Api-Version: 2022-11-28")
          code=$(curl -sS -o /tmp/pages.json -w '%{http_code}' -X POST "${auth[@]}" -d '{"build_type":"workflow"}' "$api")
          if [[ "$code" != "201" && "$code" != "204" && "$code" != "409" ]]; then
            code=$(curl -sS -o /tmp/pages.json -w '%{http_code}' -X PUT "${auth[@]}" -d '{"build_type":"workflow"}' "$api")
          fi
          echo "Pages API response: ${code}"
          cat /tmp/pages.json || true

      - name: Configure Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs

      - name: Deploy Pages
        id: deployment
        uses: actions/deploy-pages@v4
