name: Remove superseded GeoTalent Pages workflow

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/replace-legacy-pages.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  finalize:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Remove the superseded workflow without testing nonexistent files
        shell: bash
        run: |
          set -euo pipefail
          rm -f .github/workflows/pages.yml
          rm -f .github/workflows/replace-legacy-pages.yml
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          if git diff --cached --quiet; then
            echo 'Legacy workflow is already absent.'
            exit 0
          fi
          git commit -m 'ci: replace the failed Pages workflow with verified deployment'
          git push origin HEAD:main
