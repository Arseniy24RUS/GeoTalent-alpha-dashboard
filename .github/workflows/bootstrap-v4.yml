name: Bootstrap complete GeoTalent repository v4

on:
  push:
    branches: [main]
    paths:
      - .github/workflows/bootstrap-v4.yml
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: geotalent-bootstrap-v4
  cancel-in-progress: false

jobs:
  bootstrap:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 25
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download verified repository archive
        shell: bash
        run: |
          set -euo pipefail
          archive_url="https://filebin.net/geotalent-alpha-dashboard-arseniy24rus-20260712/geotalent-dashboard-github-pages.zip"
          curl --fail --location --show-error \
            --connect-timeout 30 --max-time 420 \
            --retry 6 --retry-delay 5 --retry-all-errors \
            "$archive_url" --output /tmp/geotalent.zip
          unzip -t /tmp/geotalent.zip >/dev/null
          rm -rf /tmp/geotalent-extracted
          mkdir -p /tmp/geotalent-extracted
          unzip -q /tmp/geotalent.zip -d /tmp/geotalent-extracted
          test -f /tmp/geotalent-extracted/package.json
          test -f /tmp/geotalent-extracted/package-lock.json
          test -f /tmp/geotalent-extracted/src/App.jsx
          test -f /tmp/geotalent-extracted/docs/index.html
          test -f /tmp/geotalent-extracted/docs/downloads/DATA_INVENTORY.json

      - name: Synchronize complete source and data tree
        shell: bash
        run: |
          set -euo pipefail
          find . -mindepth 1 -maxdepth 1 ! -name .git ! -name .github -exec rm -rf {} +
          mkdir -p .github/workflows
          find .github -mindepth 1 -maxdepth 1 ! -name workflows -exec rm -rf {} +
          rsync -a /tmp/geotalent-extracted/ ./ \
            --exclude '.git/' \
            --exclude '.github/workflows/'
          touch docs/.nojekyll
          python - <<'PY'
          from pathlib import Path
          files = [p for p in Path('.').rglob('*') if p.is_file()]
          required = [
              Path('README.md'), Path('package.json'), Path('package-lock.json'),
              Path('src/App.jsx'), Path('src/styles.css'), Path('docs/index.html'),
              Path('docs/downloads/DATA_INVENTORY.json')
          ]
          missing = [str(p) for p in required if not p.exists()]
          if missing:
              raise SystemExit(f'Missing required files: {missing}')
          if len(files) < 70:
              raise SystemExit(f'Expected complete repository; only {len(files)} files found')
          print(f'Complete repository prepared: {len(files)} files')
          PY

      - name: Commit all files to main
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "feat: publish complete GeoTalent dashboard" || true
          git push origin HEAD:main

      - name: Enable GitHub Pages
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          api="https://api.github.com/repos/${GITHUB_REPOSITORY}/pages"
          headers=(
            -H "Accept: application/vnd.github+json"
            -H "Authorization: Bearer ${GH_TOKEN}"
            -H "X-GitHub-Api-Version: 2022-11-28"
          )
          status=$(curl -sS -o /tmp/pages-response.json -w '%{http_code}' \
            -X POST "${headers[@]}" -d '{"build_type":"workflow"}' "$api")
          if [[ "$status" != "201" && "$status" != "204" && "$status" != "409" ]]; then
            status=$(curl -sS -o /tmp/pages-response.json -w '%{http_code}' \
              -X PUT "${headers[@]}" -d '{"build_type":"workflow"}' "$api")
          fi
          echo "Pages API status: ${status}"
          cat /tmp/pages-response.json || true

      - name: Configure Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Upload production artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs

      - name: Deploy Pages
        id: deployment
        uses: actions/deploy-pages@v4
