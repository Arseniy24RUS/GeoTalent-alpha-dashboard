name: GeoTalent Pages — verified deployment

on:
  push:
    branches: [main]
    paths:
      - 'docs/**'
      - '.github/workflows/deploy-static.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: geotalent-pages-production
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate the committed static site
        shell: bash
        run: |
          set -euo pipefail
          test -s docs/index.html
          grep -qi '<html' docs/index.html
          grep -qi '<title' docs/index.html
          grep -qi 'GeoTalent' docs/index.html
          touch docs/.nojekyll
          echo "Validated docs/index.html ($(wc -c < docs/index.html) bytes)."

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Upload the Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./docs

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Verify the public endpoint
        shell: bash
        env:
          PAGE_URL: ${{ steps.deployment.outputs.page_url }}
        run: |
          set -euo pipefail
          test -n "$PAGE_URL"
          ok=0
          for attempt in $(seq 1 36); do
            code=$(curl -L -sS -o /tmp/site.html -w '%{http_code}' \
              --connect-timeout 15 --max-time 45 "$PAGE_URL" || true)
            echo "Attempt ${attempt}: ${PAGE_URL} -> HTTP ${code}"
            if [[ "$code" = '200' ]] \
              && grep -qi 'GeoTalent' /tmp/site.html \
              && grep -Eqi 'STEM|кадр' /tmp/site.html; then
              ok=1
              break
            fi
            sleep 10
          done
          test "$ok" = '1'
          echo "Public endpoint verified: $(wc -c < /tmp/site.html) bytes; SHA-256 $(sha256sum /tmp/site.html | awk '{print $1}')"
