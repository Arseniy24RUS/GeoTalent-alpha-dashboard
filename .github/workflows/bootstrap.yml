name: Bootstrap GeoTalent repository

on:
  push:
    branches: [main]
    paths:
      - .github/workflows/bootstrap.yml
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

environment:
  name: github-pages
  url: ${{ steps.deployment.outputs.page_url }}

concurrency:
  group: geotalent-bootstrap
  cancel-in-progress: false

jobs:
  bootstrap:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download verified GeoTalent repository package
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p /tmp/geotalent-package /tmp/geotalent-extracted
          urls=(
            "https://geotalent-alpha-dashboard.loca.lt/geotalent-dashboard-github-pages.zip"
            "https://geotalent-alpha-dashboard.serveo.net/geotalent-dashboard-github-pages.zip"
          )
          downloaded=0
          for url in "${urls[@]}"; do
            echo "Trying ${url}"
            if curl --fail --location --show-error \
              --header "bypass-tunnel-reminder: true" \
              --connect-timeout 25 --max-time 240 --retry 4 --retry-all-errors \
              "$url" --output /tmp/geotalent-package/repository.zip; then
              if unzip -t /tmp/geotalent-package/repository.zip >/dev/null; then
                downloaded=1
                break
              fi
            fi
          done
          if [[ "$downloaded" != "1" ]]; then
            echo "Unable to retrieve a valid repository package" >&2
            exit 1
          fi
          unzip -q /tmp/geotalent-package/repository.zip -d /tmp/geotalent-extracted
          test -f /tmp/geotalent-extracted/package.json
          test -f /tmp/geotalent-extracted/docs/index.html

      - name: Synchronize complete project
        shell: bash
        run: |
          set -euo pipefail
          find . -mindepth 1 -maxdepth 1 ! -name .git ! -name .github -exec rm -rf {} +
          mkdir -p .github/workflows
          find .github -mindepth 1 -maxdepth 1 ! -name workflows -exec rm -rf {} +
          rsync -a /tmp/geotalent-extracted/ ./ --exclude '.git/' --exclude '.github/workflows/'
          touch docs/.nojekyll
          python - <<'PY'
          from pathlib import Path
          required = [
              Path('package.json'), Path('package-lock.json'), Path('README.md'),
              Path('src/App.jsx'), Path('src/styles.css'), Path('docs/index.html'),
              Path('docs/downloads/DATA_INVENTORY.json')
          ]
          missing = [str(p) for p in required if not p.exists()]
          if missing:
              raise SystemExit(f'Missing required files: {missing}')
          print('Synchronized files:', sum(1 for p in Path('.').rglob('*') if p.is_file()))
          PY

      - name: Commit all project files to main
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "feat: publish complete GeoTalent dashboard" || true
          git push origin HEAD:main

      - name: Enable GitHub Pages for Actions deployment
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          api="https://api.github.com/repos/${GITHUB_REPOSITORY}/pages"
          body='{"build_type":"workflow"}'
          status=$(curl --silent --show-error --output /tmp/pages-response.json --write-out '%{http_code}' \
            --request POST \
            --header "Accept: application/vnd.github+json" \
            --header "Authorization: Bearer ${GH_TOKEN}" \
            --header "X-GitHub-Api-Version: 2022-11-28" \
            --data "$body" "$api")
          if [[ "$status" != "201" && "$status" != "204" && "$status" != "409" ]]; then
            status=$(curl --silent --show-error --output /tmp/pages-response.json --write-out '%{http_code}' \
              --request PUT \
              --header "Accept: application/vnd.github+json" \
              --header "Authorization: Bearer ${GH_TOKEN}" \
              --header "X-GitHub-Api-Version: 2022-11-28" \
              --data "$body" "$api")
          fi
          echo "Pages API status: $status"
          cat /tmp/pages-response.json || true

      - name: Configure Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Upload static site
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs

      - name: Deploy GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
