name: Diagnose GeoTalent Pages API

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  diagnose:
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - name: Print Pages API responses
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set +e
          api="https://api.github.com/repos/${GITHUB_REPOSITORY}/pages"
          headers=(-H 'Accept: application/vnd.github+json' -H "Authorization: Bearer ${GH_TOKEN}" -H 'X-GitHub-Api-Version: 2022-11-28')
          get_code=$(curl -sS -o /tmp/get.json -w '%{http_code}' "${headers[@]}" "$api")
          echo "PAGES_GET_CODE=${get_code}"
          echo 'PAGES_GET_BODY_BEGIN'
          cat /tmp/get.json
          echo
          echo 'PAGES_GET_BODY_END'
          post_code=$(curl -sS -o /tmp/post.json -w '%{http_code}' -X POST "${headers[@]}" -d '{"build_type":"workflow"}' "$api")
          echo "PAGES_POST_CODE=${post_code}"
          echo 'PAGES_POST_BODY_BEGIN'
          cat /tmp/post.json
          echo
          echo 'PAGES_POST_BODY_END'
          put_code=$(curl -sS -o /tmp/put.json -w '%{http_code}' -X PUT "${headers[@]}" -d '{"build_type":"workflow"}' "$api")
          echo "PAGES_PUT_CODE=${put_code}"
          echo 'PAGES_PUT_BODY_BEGIN'
          cat /tmp/put.json
          echo
          echo 'PAGES_PUT_BODY_END'
          exit 0
